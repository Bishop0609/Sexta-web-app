<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sistema de Gestión - Sexta Compañía de Bomberos Coquimbo">

  <!-- Fix para pantalla recortada y escalado móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Forzar verificación de versión nueva (refuerzo del .htaccess) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sexta Compañía">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sexta Compañía - Sistema de Gestión</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Chequeo de versión: corre al cargar Y al volver a la pestaña -->
  <script>
    (function() {
      var APP_VERSION = '15';
      var reloadGuardKey = 'version_reload_guard';

      function checkVersion() {
        fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.version && data.version !== APP_VERSION) {
              // Evitar loop de recargas: solo recargar una vez por sesión
              if (sessionStorage.getItem(reloadGuardKey) !== data.version) {
                sessionStorage.setItem(reloadGuardKey, data.version);
                window.location.reload(true);
              }
            }
          })
          .catch(function() { /* silencioso */ });
      }

      // Chequear al cargar la página
      checkVersion();

      // Chequear también cuando el usuario vuelve a la pestaña
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          checkVersion();
        }
      });
    })();
  </script>

  <!-- Limpieza legacy de service workers (mantener hasta confirmar que nadie los tiene) -->
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
